<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI & Rupee-per-100 Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; max-width: 400px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .result { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .value { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Loan Calculator</h2>
        <label>Principal Amount (₹)</label>
        <input type="number" id="p" value="1012068">
        <label>Annual Interest (%)</label>
        <input type="number" id="r" value="10.85" step="0.01">
        <label>Tenure (Months)</label>
        <input type="number" id="n" value="72">
        <button onclick="calculate()">Calculate Now</button>

        <div class="result" id="res" style="display:none;">
            <p>Monthly EMI: <span class="value" id="emi"></span></p>
            <p>Total Interest: <span class="value" id="interest"></span></p>
            <p>Paisa per ₹100 (Monthly): <span class="value" id="paisa"></span></p>
        </div>
    </div>

    <script>
        function calculate() {
            let P = parseFloat(document.getElementById('p').value);
            let annualR = parseFloat(document.getElementById('r').value);
            let N = parseFloat(document.getElementById('n').value);
            
            let R = (annualR / 12) / 100;
            let emi = P * R * Math.pow(1 + R, N) / (Math.pow(1 + R, N) - 1);
            let totalPaid = emi * N;
            let totalInterest = totalPaid - P;
            
            // Calculating the "Paisa per 100" flat rate
            let flatMonthlyRate = ((totalInterest / P) / N) * 100;

            document.getElementById('res').style.display = 'block';
            document.getElementById('emi').innerText = '₹' + emi.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('interest').innerText = '₹' + totalInterest.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('paisa').innerText = flatMonthlyRate.toFixed(2) + ' Paisa';
        }
    </script>
</body>
</html>
